<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BoldOS — Agro Intelligence Suite</title>
<link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --bold-cyan:#06ffe1;--bold-magenta:#f85cff;--bold-black:#0a0a0a;--bold-dark:#141414;
  --bold-gray-1:#1e1e1e;--bold-gray-2:#2a2a2a;--bold-gray-3:#aaa;--bold-white:#f0f0f0;
  --sig-up:#00e676;--sig-warn:#ffd740;--sig-alert:#ff9100;--sig-down:#ff5252;--sig-mute:#616161;
  --font-head:'Varela Round',sans-serif;
  --font-body:'Avenir Next','Avenir',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --font-mono:'SF Mono','Fira Code','Consolas',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bold-black);color:var(--bold-white);font-family:var(--font-body);font-size:14px;-webkit-font-smoothing:antialiased;}
::selection{background:rgba(6,255,225,.25);color:#fff;}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--bold-black);}
::-webkit-scrollbar-thumb{background:var(--bold-gray-2);border-radius:3px;}

/* ── HEADER ── */
.app-header{position:fixed;top:0;left:0;right:0;z-index:1000;background:var(--bold-black);border-bottom:1px solid var(--bold-gray-1);display:flex;align-items:center;height:56px;padding:0 24px;gap:32px;}
.logo-wrap{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.logo-wrap img{height:22px;width:auto;display:block;filter:drop-shadow(0 0 8px rgba(6,255,225,.25));}
.suite-label{font-family:var(--font-body);font-size:11px;color:var(--bold-gray-3);text-transform:uppercase;letter-spacing:2px;border-left:1px solid var(--bold-gray-1);padding-left:12px;}
.nav-tabs{display:flex;gap:4px;margin-left:16px;}
.nav-tab{font-family:var(--font-head);font-size:13px;color:var(--bold-gray-3);padding:8px 16px;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all .2s;position:relative;white-space:nowrap;}
.nav-tab:hover{color:var(--bold-white);}
.nav-tab.active{color:var(--bold-cyan);border-bottom-color:var(--bold-cyan);}
.nav-tab .tab-num{font-family:var(--font-mono);font-size:10px;color:var(--bold-gray-2);margin-right:6px;}
.nav-tab.active .tab-num{color:rgba(6,255,225,.4);}
.header-right{margin-left:auto;display:flex;align-items:center;gap:16px;font-size:12px;color:var(--bold-gray-3);}
.header-right .campaign{font-family:var(--font-mono);color:var(--bold-cyan);font-size:11px;background:rgba(6,255,225,.08);padding:4px 10px;border-radius:6px;border:1px solid rgba(6,255,225,.15);}

/* ── MAIN ── */
.app-main{margin-top:56px;padding:24px;min-height:calc(100vh - 56px);}
.view{display:none;animation:fadeUp .35s ease;}
.view.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

/* ── SECTION TITLES ── */
.section-title{font-family:var(--font-head);font-size:20px;color:var(--bold-white);margin-bottom:4px;}
.section-sub{font-size:13px;color:var(--bold-gray-3);margin-bottom:20px;line-height:1.5;}
.hud-bracket{position:relative;padding:20px 24px;margin-bottom:24px;}
.hud-bracket::before,.hud-bracket::after{content:'';position:absolute;width:16px;height:16px;border-color:var(--bold-cyan);border-style:solid;opacity:.3;}
.hud-bracket::before{top:0;left:0;border-width:2px 0 0 2px;}
.hud-bracket::after{bottom:0;right:0;border-width:0 2px 2px 0;}

/* ── KPI CARDS ── */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px;}
.kpi-card{background:var(--bold-dark);border:1px solid var(--bold-gray-1);border-radius:12px;padding:20px;position:relative;overflow:hidden;}
.kpi-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:12px 0 0 12px;}
.kpi-card.up::before{background:var(--sig-up);}
.kpi-card.warn::before{background:var(--sig-warn);}
.kpi-card.alert::before{background:var(--sig-alert);}
.kpi-card.down::before{background:var(--sig-down);}
.kpi-card.cyan::before{background:var(--bold-cyan);}
.kpi-card.mag::before{background:var(--bold-magenta);}
.kpi-label{font-size:11px;color:var(--bold-gray-3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.kpi-value{font-family:var(--font-mono);font-size:28px;font-weight:700;color:var(--bold-white);line-height:1;}
.kpi-delta{font-family:var(--font-mono);font-size:12px;margin-top:6px;}
.kpi-delta.up{color:var(--sig-up);}
.kpi-delta.down{color:var(--sig-down);}
.kpi-delta.warn{color:var(--sig-warn);}
.kpi-unit{font-size:14px;font-weight:400;color:var(--bold-gray-3);margin-left:4px;}

/* ── CARDS & PANELS ── */
.card{background:var(--bold-dark);border:1px solid var(--bold-gray-1);border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 0 20px rgba(6,255,225,.03);}
.card-title{font-family:var(--font-head);font-size:15px;margin-bottom:14px;color:var(--bold-white);display:flex;align-items:center;gap:8px;}
.card-title .icon{color:var(--bold-cyan);font-size:16px;}

/* ── GRID ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
.grid-map-right{display:grid;grid-template-columns:1fr 460px;gap:16px;}
.grid-map-left{display:grid;grid-template-columns:460px 1fr;gap:16px;}
@media(max-width:1100px){.grid-2,.grid-3,.grid-map-right,.grid-map-left{grid-template-columns:1fr;}}

/* ── TABLES ── */
.tbl{width:100%;border-collapse:collapse;font-size:13px;}
.tbl th{background:var(--bold-gray-1);color:var(--bold-gray-3);font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding:10px 12px;text-align:left;font-weight:600;position:sticky;top:0;}
.tbl td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.04);}
.tbl tr:nth-child(even) td{background:rgba(255,255,255,.015);}
.tbl tr:hover td{background:rgba(6,255,225,.04);}
.tbl .num{font-family:var(--font-mono);text-align:right;}

/* ── PILLS / BADGES ── */
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;border:1px solid;}
.pill.green{color:var(--sig-up);border-color:rgba(0,230,118,.3);background:rgba(0,230,118,.08);}
.pill.yellow{color:var(--sig-warn);border-color:rgba(255,215,64,.3);background:rgba(255,215,64,.08);}
.pill.orange{color:var(--sig-alert);border-color:rgba(255,145,0,.3);background:rgba(255,145,0,.08);}
.pill.red{color:var(--sig-down);border-color:rgba(255,82,82,.3);background:rgba(255,82,82,.08);}
.pill.cyan{color:var(--bold-cyan);border-color:rgba(6,255,225,.3);background:rgba(6,255,225,.08);}
.pill .dot{width:6px;height:6px;border-radius:50%;background:currentColor;}

/* ── SCORE GAUGE ── */
.score-wrap{display:flex;align-items:center;gap:20px;}
.score-circle{width:120px;height:120px;position:relative;flex-shrink:0;}
.score-circle svg{width:100%;height:100%;transform:rotate(-90deg);}
.score-circle .bg{fill:none;stroke:var(--bold-gray-1);stroke-width:8;}
.score-circle .fg{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .8s ease;}
.score-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:32px;font-weight:700;}
.score-label{font-size:12px;color:var(--bold-gray-3);margin-top:4px;}

/* ── SEMAFORO ROW ── */
.sem-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin:16px 0;}
.sem-item{display:flex;align-items:center;gap:10px;background:var(--bold-gray-1);border-radius:8px;padding:10px 14px;}
.sem-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.sem-item .lbl{font-size:12px;color:var(--bold-gray-3);}
.sem-item .val{font-size:13px;font-weight:600;margin-left:auto;}

/* ── MAP ── */
#map-oportunidad,#map-cartera{height:400px;border-radius:12px;overflow:hidden;border:1px solid var(--bold-gray-1);background:var(--bold-dark);}
.leaflet-container{background:var(--bold-black)!important;}

/* ── FILTERS ── */
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;align-items:center;}
.filter-bar label{font-size:11px;color:var(--bold-gray-3);text-transform:uppercase;letter-spacing:.5px;}
.filter-bar select,.filter-bar input[type="text"]{background:var(--bold-gray-1);border:1px solid var(--bold-gray-2);color:var(--bold-white);padding:7px 12px;border-radius:8px;font-size:13px;font-family:var(--font-body);outline:none;min-width:140px;}
.filter-bar select:focus,.filter-bar input:focus{border-color:var(--bold-cyan);box-shadow:0 0 0 2px rgba(6,255,225,.1);}

/* ── BTN ── */
.btn{font-family:var(--font-head);font-size:13px;padding:8px 20px;border-radius:8px;cursor:pointer;border:none;transition:all .2s;}
.btn-primary{background:var(--bold-cyan);color:var(--bold-black);font-weight:600;}
.btn-primary:hover{box-shadow:0 0 16px rgba(6,255,225,.3);}
.btn-secondary{background:transparent;border:1px solid var(--bold-cyan);color:var(--bold-cyan);}
.btn-secondary:hover{background:rgba(6,255,225,.08);}

/* ── FOOTER BADGE ── */
.boldos-badge{display:flex;align-items:center;gap:8px;padding:12px 20px;background:rgba(6,255,225,.04);border:1px solid rgba(6,255,225,.1);border-radius:10px;font-size:12px;color:var(--bold-white);opacity:.7;margin-top:24px;}
.boldos-badge .shield{color:var(--bold-cyan);font-size:16px;}

/* ── VERIFY BLOCK ── */
.verify-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:0;border:1px solid rgba(6,255,225,.15);border-radius:12px;overflow:hidden;}
.verify-col{padding:16px 20px;}
.verify-col.declared{background:rgba(255,255,255,.02);}
.verify-col.vs{display:flex;align-items:center;justify-content:center;background:rgba(6,255,225,.05);padding:0 12px;font-family:var(--font-mono);color:var(--bold-cyan);font-size:11px;}
.verify-col.detected{background:rgba(6,255,225,.03);}
.verify-col h4{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--bold-gray-3);margin-bottom:12px;}
.verify-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;}
.verify-row:last-child{border:none;}
.verify-row .vlbl{color:var(--bold-gray-3);}
.verify-row .vval{font-family:var(--font-mono);font-weight:600;}
.match{color:var(--sig-up);}
.mismatch{color:var(--sig-down);}

/* ── ALERTS ── */
.alert-item{display:flex;gap:12px;padding:12px 16px;border-radius:10px;background:var(--bold-dark);border-left:4px solid;margin-bottom:8px;align-items:flex-start;}
.alert-item.red{border-color:var(--sig-down);}
.alert-item.orange{border-color:var(--sig-alert);}
.alert-item.yellow{border-color:var(--sig-warn);}
.alert-item .a-icon{font-size:16px;margin-top:2px;flex-shrink:0;}
.alert-item .a-text{font-size:13px;}
.alert-item .a-action{font-size:11px;color:var(--bold-cyan);margin-top:4px;cursor:pointer;}
.alert-item .a-action:hover{text-decoration:underline;}

/* ── DONUT ── */
.donut-wrap{display:flex;align-items:center;gap:24px;}
.donut-legend{display:flex;flex-direction:column;gap:6px;}
.donut-legend-item{display:flex;align-items:center;gap:8px;font-size:12px;}
.donut-legend-item .dlc{width:10px;height:10px;border-radius:3px;flex-shrink:0;}

/* ── INSIGHT BOX ── */
.insight{background:rgba(248,92,255,.04);border:1px solid rgba(248,92,255,.12);border-radius:10px;padding:14px 18px;font-size:13px;color:var(--bold-white);margin-bottom:12px;display:flex;gap:10px;align-items:flex-start;}
.insight .i-icon{color:var(--bold-magenta);flex-shrink:0;font-size:16px;}

/* ── CHART ── */
.mini-chart{margin:12px 0;}
.mini-chart svg{width:100%;height:auto;}

/* ── DRILL CLIENT ── */
.client-header{display:flex;align-items:center;gap:16px;padding:16px 20px;background:var(--bold-dark);border:1px solid var(--bold-gray-1);border-radius:12px;margin-bottom:20px;}
.client-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--bold-cyan),var(--bold-magenta));display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-size:18px;color:var(--bold-black);font-weight:700;flex-shrink:0;}
.client-info h3{font-family:var(--font-head);font-size:16px;}
.client-info .meta{font-size:12px;color:var(--bold-gray-3);margin-top:2px;}

/* ── VERDICT ── */
.verdict-box{padding:20px 24px;border-radius:12px;border:2px solid;margin-bottom:16px;display:flex;align-items:center;gap:16px;}
.verdict-box.approve{border-color:var(--sig-up);background:rgba(0,230,118,.06);}
.verdict-box.review{border-color:var(--sig-warn);background:rgba(255,215,64,.06);}
.verdict-box.reject{border-color:var(--sig-down);background:rgba(255,82,82,.06);}
.verdict-icon{font-size:28px;flex-shrink:0;}
.verdict-label{font-family:var(--font-head);font-size:18px;font-weight:700;}
.verdict-sub{font-size:12px;color:var(--bold-gray-3);margin-top:2px;}

/* ── PRIORITY RANK ── */
.rank-num{font-family:var(--font-mono);font-size:16px;font-weight:700;color:var(--bold-cyan);width:28px;text-align:center;}
.priority-bar{height:6px;border-radius:3px;background:var(--bold-gray-1);position:relative;overflow:hidden;min-width:60px;}
.priority-bar .fill{position:absolute;left:0;top:0;bottom:0;border-radius:3px;transition:width .4s ease;}

/* ── GO/NOGO ── */
.go-badge{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-head);font-size:12px;font-weight:700;padding:4px 12px;border-radius:6px;letter-spacing:.5px;}
.go-badge.go{background:rgba(0,230,118,.15);color:var(--sig-up);border:1px solid rgba(0,230,118,.3);}
.go-badge.nogo{background:rgba(255,82,82,.15);color:var(--sig-down);border:1px solid rgba(255,82,82,.3);}
.go-badge.review{background:rgba(255,215,64,.15);color:var(--sig-warn);border:1px solid rgba(255,215,64,.3);}

/* ── ACTION REQUIRED BANNER ── */
.action-banner{background:linear-gradient(135deg,rgba(255,82,82,.08),rgba(255,145,0,.08));border:1px solid rgba(255,82,82,.2);border-radius:12px;padding:16px 20px;margin-bottom:16px;}
.action-banner .ab-title{font-family:var(--font-head);font-size:14px;color:var(--sig-down);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.action-banner .ab-count{font-family:var(--font-mono);font-size:24px;font-weight:700;color:var(--bold-white);}

/* ── FACTOR ITEM ── */
.factor-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;}
.factor-item:last-child{border:none;}
.factor-icon{font-size:14px;margin-top:1px;flex-shrink:0;}

/* ── MISC ── */
.text-cyan{color:var(--bold-cyan);}
.text-mag{color:var(--bold-magenta);}
.text-muted{color:var(--bold-gray-3);}
.text-up{color:var(--sig-up);}
.text-down{color:var(--sig-down);}
.mt-16{margin-top:16px;}
.mb-8{margin-bottom:8px;}
.mb-16{margin-bottom:16px;}
.flex-between{display:flex;justify-content:space-between;align-items:center;}
.gap-8{gap:8px;}
.tbl-scroll{max-height:400px;overflow-y:auto;overflow-x:hidden;border-radius:8px;}
.hidden{display:none!important;}
</style>
</head>

// HELPERS
// ══════════════════════════════════════════════════════
const fmt=n=>n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(0)+'K':n.toString();
const fmtUSD=n=>'USD '+fmt(n);
const fmtNum=n=>n.toLocaleString('es-AR');
const scoreColor=s=>s>=75?'var(--sig-up)':s>=55?'var(--sig-warn)':s>=40?'var(--sig-alert)':'var(--sig-down)';
const scorePill=s=>s>=75?'green':s>=55?'yellow':s>=40?'orange':'red';
const scoreLabel=s=>s>=75?'Bajo Riesgo':s>=55?'Riesgo Moderado':s>=40?'Riesgo Elevado':'Riesgo Critico';
const condColor=c=>({excellent:'var(--sig-up)',good:'var(--sig-up)',fair:'var(--sig-warn)',poor:'var(--sig-down)'})[c]||'var(--sig-mute)';
const condLabel=c=>({excellent:'Excelente',good:'Buena',fair:'Regular',poor:'Deficiente'})[c]||'--';
const wsLabel=w=>({low:'Bajo',moderate:'Moderado',high:'Alto'})[w]||'--';
const wsColor=w=>({low:'var(--sig-up)',moderate:'var(--sig-warn)',high:'var(--sig-down)'})[w]||'var(--sig-mute)';
const sustColor=s=>({alta:'var(--sig-up)',media:'var(--sig-warn)',baja:'var(--sig-down)'})[s];

function clientCapProd(c){
  let total=0;
  c.lotes.forEach(l=>{
    const price=CROPS[l.crop]?.price||300;
    total+=l.ha*l.yC/10*price;
  });
  return Math.round(total);
}

function badgeHTML(){
  return '<div class="boldos-badge"><span class="shield">&#128737;</span> Informacion obtenida por sensorizacion BoldOS -- sin intervencion del productor</div>';
}

function scoreCircleSVG(val,size){
  size=size||120;
  var r=48,circ=2*Math.PI*r,off=circ*(1-val/100);
  var col=scoreColor(val);
  return '<div class="score-circle" style="width:'+size+'px;height:'+size+'px">'+
    '<svg viewBox="0 0 120 120"><circle class="bg" cx="60" cy="60" r="'+r+'"/><circle class="fg" cx="60" cy="60" r="'+r+'" stroke="'+col+'" stroke-dasharray="'+circ+'" stroke-dashoffset="'+off+'"/></svg>'+
    '<div class="score-num" style="color:'+col+'">'+val+'</div></div>';
}

// Verdict logic
function clientVerdict(c){
  if(c.score>=70 && c.cobertura>=1.2) return {verdict:'APROBAR',cls:'approve',icon:'&#9989;',reason:'Score alto con cobertura suficiente. Baja probabilidad de default.'};
  if(c.score<40 || c.cobertura<0.8) return {verdict:'RECHAZAR',cls:'reject',icon:'&#10060;',reason:'Riesgo excesivo. '+(c.cobertura<0.8?'Cobertura productiva insuficiente. ':'')+(c.score<40?'Score critico por deterioro de lotes.':'')};
  return {verdict:'REVISAR',cls:'review',icon:'&#9888;&#65039;',reason:'Requiere analisis adicional. Factores mixtos detectados.'};
}

// Go/NoGo for precalificacion
function goNoGo(c){
  if(c.score>=70 && c.cobertura>=1.2) return {label:'GO',cls:'go',text:'Priorizar -- capacidad productiva verificada'};
  if(c.score<40 || c.cobertura<0.8) return {label:'NO GO',cls:'nogo',text:'No abrir analisis -- riesgo estructural detectado'};
  return {label:'REVISAR',cls:'review',text:'Evaluar con informacion complementaria'};
}

// Priority index for opportunity (higher = more attractive for lenders)
function deptoPriority(d){
  var dd=DEPTO_DATA[d];
  // Normalize: high value, low saturation = high priority
  var valScore=Math.min(dd.valProd/2000000,1);
  var satPenalty=dd.saturation/100;
  return Math.round((valScore*(1-satPenalty*0.6))*100);
}

// Positive/negative factors
function clientFactors(c){
  var pos=[],neg=[];
  if(c.score>=70) pos.push('Score de riesgo favorable ('+c.score+'/100)');
  else neg.push('Score de riesgo '+(c.score<40?'critico':'moderado')+' ('+c.score+'/100)');
  if(c.cobertura>=1.5) pos.push('Cobertura productiva solida ('+c.cobertura.toFixed(2)+'x)');
  else if(c.cobertura<1) neg.push('Cobertura insuficiente ('+c.cobertura.toFixed(2)+'x) -- riesgo de default');
  else pos.push('Cobertura productiva aceptable ('+c.cobertura.toFixed(2)+'x)');
  if(c.lotes.every(function(l){return l.rotation})) pos.push('Rotacion de cultivos activa en todos los lotes');
  else neg.push('Falta de rotacion detectada -- degradacion de suelo');
  if(!c.lotes.some(function(l){return l.ws==='high'})) pos.push('Sin estres hidrico critico');
  else neg.push('Estres hidrico alto en al menos un lote');
  if(c.historial==='excelente'||c.historial==='bueno') pos.push('Historial crediticio '+c.historial);
  else neg.push('Historial crediticio '+c.historial);
  // Check declared vs detected discrepancies
  var declaredVals=Object.values(c.declared);
  var detectedVals=Object.values(c.detected);
  var mismatches=declaredVals.filter(function(v,i){return v!==detectedVals[i]}).length;
  if(mismatches===0) pos.push('DDJJ coincide 100% con sensorizacion');
  else if(mismatches>=3) neg.push('Discrepancias significativas entre DDJJ y sensorizacion ('+mismatches+' campos)');
  else neg.push('Discrepancias menores en DDJJ ('+mismatches+' campo'+(mismatches>1?'s':'')+')');
  return {pos:pos,neg:neg};
}

let map=null,mapLayers=[];
function initMap(containerId){
  if(map){map.remove();map=null;}
  const el=document.getElementById(containerId);
  if(!el)return;
  map=L.map(containerId,{zoomControl:true,attributionControl:false}).setView([-33.5,-62],6);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'OpenStreetMap CARTO',maxZoom:18}).addTo(map);
  setTimeout(function(){if(map)map.invalidateSize()},100);
  setTimeout(function(){if(map)map.invalidateSize()},400);
  setTimeout(function(){if(map)map.invalidateSize()},1000);
}
function clearMapLayers(){mapLayers.forEach(function(l){map.removeLayer(l)});mapLayers=[];}

const views=['oportunidad','precalificacion','evaluacion','cartera'];
let currentView='oportunidad';

function switchView(v){
  currentView=v;
  document.querySelectorAll('.nav-tab').forEach(function(t){t.classList.toggle('active',t.dataset.view===v)});
  document.querySelectorAll('.view').forEach(function(el){el.classList.toggle('active',el.id==='view-'+v)});
  history.pushState(null,null,'#'+v);
  renderView(v);
}

document.querySelectorAll('.nav-tab').forEach(function(t){t.addEventListener('click',function(){switchView(t.dataset.view)})});
window.addEventListener('popstate',function(){var h=location.hash.slice(1);if(views.includes(h))switchView(h);});

  else if(v==='cartera')renderCartera(el);
}

          '<div class="kpi-card '+(client.cobertura>=1?'up':'down')+'"><div class="kpi-label">Ratio de Cobertura</div><div class="kpi-value">'+client.cobertura.toFixed(2)+'x</div><div class="kpi-delta '+(client.cobertura>=1?'up':'down')+'">'+(client.cobertura>=1?'&#9650; Cobertura suficiente':'&#9660; Cobertura insuficiente')+'</div></div>'+
        '</div>'+
      '</div>'+
      '<div>'+
        '<div class="card">'+
          '<div class="card-title"><span class="icon" style="color:var(--bold-magenta)">&#9889;</span> Verificacion vs DDJJ</div>'+
          '<div class="verify-grid">'+
            '<div class="verify-col declared">'+
              '<h4>Declarado por productor</h4>'+
              Object.entries(client.declared).map(function(e){return '<div class="verify-row"><span class="vlbl">'+e[0].replace(/_/g,' ')+'</span><span class="vval">'+e[1]+'</span></div>'}).join('')+
            '</div>'+
            '<div class="verify-col vs">VS</div>'+
            '<div class="verify-col detected">'+
              '<h4>Detectado por BoldOS</h4>'+
              Object.entries(client.detected).map(function(e,i){
                var dk=Object.keys(client.declared)[i];
                var dv=Object.values(client.declared)[i];
                var match=e[1]===dv;
                return '<div class="verify-row"><span class="vlbl">'+e[0].replace(/_/g,' ')+'</span><span class="vval '+(match?'match':'mismatch')+'">'+e[1]+' '+(match?'&#10003;':'&#9888;')+'</span></div>';
              }).join('')+
            '</div>'+
          '</div>'+
        '</div>'+
        '<div class="card">'+
          '<div class="card-title"><span class="icon">&#9673;</span> Lotes del Cliente</div>'+
          '<div class="tbl-scroll">'+
            '<table class="tbl">'+
              '<thead><tr><th>Lote</th><th class="num">Ha</th><th>Cultivo</th><th class="num">Rinde</th><th>Cond.</th><th>Estres</th></tr></thead>'+
              '<tbody>'+
                client.lotes.map(function(l){return '<tr>'+
                  '<td>'+l.name+'</td><td class="num">'+l.ha+'</td><td><span style="color:'+(CROPS[l.crop]?.color||'#fff')+'">'+(CROPS[l.crop]?.label||l.crop)+'</span></td>'+
                  '<td class="num">'+l.yC+' qq/ha</td><td><span style="color:'+condColor(l.cond)+'">'+condLabel(l.cond)+'</span></td><td><span style="color:'+wsColor(l.ws)+'">'+wsLabel(l.ws)+'</span></td>'+
                '</tr>'}).join('')+
              '</tbody>'+
            '</table>'+
          '</div>'+
        '</div>'+
      '</div>'+
    '</div>'+
    badgeHTML();

  // Populate pipeline table
  var ptbody=el.querySelector('#pipeline-table tbody');
  sortedClients.forEach(function(c){
    var g=goNoGo(c);
    ptbody.innerHTML+=
      '<tr style="cursor:pointer" onclick="selectPrequal('+c.id+')">'+
        '<td style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis'+(c.id===client.id?';color:var(--bold-cyan)':'')+'">'+(c.id===client.id?'&#9654; ':'')+c.name+'</td>'+
        '<td>'+c.depto+'</td>'+
        '<td class="num" style="font-family:var(--font-mono);color:'+scoreColor(c.score)+'">'+c.score+'</td>'+
        '<td class="num" style="color:'+(c.cobertura>=1?'var(--sig-up)':'var(--sig-down)')+'">'+c.cobertura.toFixed(2)+'x</td>'+
        '<td><span class="go-badge '+g.cls+'" style="font-size:10px;padding:2px 8px">'+g.label+'</span></td>'+
      '</tr>';
  });

  // Client selector bind (select in pipeline table)
  // (handled via onclick on rows)
}

window.selectPrequal=function(id){
  renderPrecalificacion(document.getElementById('view-precalificacion'),id);
};

// ══════════════════════════════════════════════════════
// VIEW 3: DECISION CREDITICIA (ex Evaluacion)
// ══════════════════════════════════════════════════════
function renderEvaluacion(el,clientId){
  var client=CLIENTS.find(function(c){return c.id===(clientId||1)});
  var capProd=clientCapProd(client);
  var verd=clientVerdict(client);
  var factors=clientFactors(client);

  // trend data (mock 90 days)
  var trendData=[];
  for(var i=0;i<12;i++){var d=new Date(2024,9,1);d.setDate(d.getDate()+i*8);trendData.push({date:d,ndvi:.55+Math.random()*.3-i*.005+(client.score>60?.1:-.05)});}
  var tW=360,tH=100,pts=trendData.map(function(d,i){return (10+i*(tW-20)/(trendData.length-1))+','+(tH-10-(d.ndvi-.3)*tH/.6)}).join(' ');
  var trendSVG='<svg viewBox="0 0 '+tW+' '+(tH+20)+'" xmlns="http://www.w3.org/2000/svg">'+
    '<line x1="10" y1="'+(tH-10)+'" x2="'+(tW-10)+'" y2="'+(tH-10)+'" stroke="#2a2a2a" stroke-width="1"/>'+
    '<polyline points="'+pts+'" fill="none" stroke="#06ffe1" stroke-width="2" stroke-linejoin="round"/>'+
    '<text x="10" y="'+(tH+16)+'" fill="#888" font-size="9" font-family="monospace">Oct</text>'+
    '<text x="'+(tW/3)+'" y="'+(tH+16)+'" fill="#888" font-size="9" font-family="monospace">Nov</text>'+
    '<text x="'+(2*tW/3)+'" y="'+(tH+16)+'" fill="#888" font-size="9" font-family="monospace">Dic</text>'+
    '<text x="'+(tW-30)+'" y="'+(tH+16)+'" fill="#888" font-size="9" font-family="monospace">Ene</text>'+
  '</svg>';

  var alerts=[];
  client.lotes.forEach(function(l){
    if(l.ws==='high')alerts.push({type:'red',icon:'&#128308;',text:l.name+': estres hidrico alto detectado. Riesgo de perdida de rendimiento.',action:'Solicitar garantia adicional'});
    if(!l.rotation)alerts.push({type:'orange',icon:'&#128992;',text:l.name+': sin rotacion detectada -- monocultivo de '+(CROPS[l.crop]?.label||l.crop)+'.',action:'Evaluar sustentabilidad a mediano plazo'});
    if(l.cond==='poor')alerts.push({type:'red',icon:'&#128308;',text:l.name+': condicion deficiente (NDVI '+l.ndvi.toFixed(2)+').',action:'Revisar garantia asociada'});
  });
  if(client.cobertura<1)alerts.push({type:'red',icon:'&#128308;',text:'Cobertura productiva por debajo de 1.0x ('+client.cobertura.toFixed(2)+'x). Riesgo de default.',action:'Contactar cliente para renegociar'});

  el.innerHTML=
    '<div class="hud-bracket">'+
      '<div class="section-title">Decision Crediticia</div>'+
      '<div class="section-sub">Toda la informacion para decidir en un solo lugar. Podes explicar por que si o por que no otorgar.</div>'+
    '</div>'+
    '<div class="filter-bar">'+
      '<label>Cliente</label>'+
      '<select id="f-client-eval">'+CLIENTS.map(function(c){return '<option value="'+c.id+'" '+(c.id===client.id?'selected':'')+'>'+c.name+'</option>'}).join('')+'</select>'+
      '<button class="btn btn-primary" onclick="alert(\'Demo: Informe incluido en legajo digital\')">&#128206; Incluir en legajo</button>'+
    '</div>'+

    // VERDICT BOX - the system recommendation
    '<div class="verdict-box '+verd.cls+'">'+
      '<span class="verdict-icon">'+verd.icon+'</span>'+
      '<div>'+
        '<div class="verdict-label" style="color:'+(verd.cls==='approve'?'var(--sig-up)':verd.cls==='reject'?'var(--sig-down)':'var(--sig-warn)')+'">RECOMENDACION: '+verd.verdict+'</div>'+
        '<div class="verdict-sub">'+verd.reason+'</div>'+
      '</div>'+
    '</div>'+

    '<div class="card" style="margin-bottom:16px">'+
      '<div class="flex-between mb-16">'+
        '<div>'+
          '<div class="card-title" style="margin-bottom:4px"><span class="icon">&#9673;</span> '+client.name+'</div>'+
          '<div style="font-size:12px;color:var(--bold-gray-3)">CUIT '+client.cuit+' -- '+client.depto+', '+client.prov+' -- Campana 2024/25</div>'+
        '</div>'+
        '<span class="pill '+scorePill(client.score)+'"><span class="dot"></span>'+scoreLabel(client.score)+'</span>'+
      '</div>'+
      '<div class="kpi-row" style="grid-template-columns:repeat(4,1fr)">'+
        '<div class="kpi-card cyan"><div class="kpi-label">Score</div><div class="kpi-value">'+client.score+'<span class="kpi-unit">/100</span></div></div>'+
        '<div class="kpi-card up"><div class="kpi-label">Cap. Productiva</div><div class="kpi-value">'+fmtUSD(capProd)+'</div></div>'+
        '<div class="kpi-card '+(client.cobertura>=1?'up':'down')+'"><div class="kpi-label">Cobertura</div><div class="kpi-value">'+client.cobertura.toFixed(2)+'x</div></div>'+
        '<div class="kpi-card warn"><div class="kpi-label">Ha Totales</div><div class="kpi-value">'+fmtNum(client.lotes.reduce(function(s,l){return s+l.ha},0))+'</div></div>'+
      '</div>'+
    '</div>'+

    '<div class="grid-2">'+
      '<div>'+
        // FACTORS PRO/CON - the justification
        '<div class="card">'+
          '<div class="card-title"><span class="icon" style="color:var(--sig-up)">&#10003;</span> Factores Positivos</div>'+
          (factors.pos.length?factors.pos.map(function(f){return '<div class="factor-item"><span class="factor-icon" style="color:var(--sig-up)">&#9679;</span><span>'+f+'</span></div>'}).join(''):'<div style="color:var(--bold-gray-3);font-size:13px;padding:8px">Sin factores positivos detectados.</div>')+
        '</div>'+
        '<div class="card">'+
          '<div class="card-title"><span class="icon" style="color:var(--sig-down)">&#10007;</span> Factores Negativos</div>'+
          (factors.neg.length?factors.neg.map(function(f){return '<div class="factor-item"><span class="factor-icon" style="color:var(--sig-down)">&#9679;</span><span>'+f+'</span></div>'}).join(''):'<div style="color:var(--bold-gray-3);font-size:13px;padding:8px">Sin factores negativos detectados.</div>')+
        '</div>'+
        '<div class="card">'+
          '<div class="card-title"><span class="icon">&#128200;</span> Evolucion Reciente (90 dias)</div>'+
          '<div class="mini-chart">'+trendSVG+'</div>'+
          '<div style="font-size:11px;color:var(--bold-gray-3)">Indice de condicion promedio. Fuente: sensorizacion BoldOS.</div>'+
        '</div>'+
      '</div>'+
      '<div>'+
        '<div class="card">'+
          '<div class="card-title"><span class="icon">&#9673;</span> Panel de Sensorizacion</div>'+
          '<table class="tbl">'+
            '<thead><tr><th>Lote</th><th>Cultivo</th><th>Siembra</th><th>Cond.</th><th>Estres</th><th class="num">NDVI</th></tr></thead>'+
            '<tbody>'+
              client.lotes.map(function(l){return '<tr>'+
                '<td>'+l.name+'</td>'+
                '<td style="color:'+(CROPS[l.crop]?.color||'#fff')+'">'+(CROPS[l.crop]?.label||l.crop)+'</td>'+
                '<td style="font-family:var(--font-mono);font-size:12px">'+l.siembra+'</td>'+
                '<td><span class="pill '+(l.cond==='excellent'||l.cond==='good'?'green':l.cond==='fair'?'yellow':'red')+'"><span class="dot"></span>'+condLabel(l.cond)+'</span></td>'+
                '<td><span style="color:'+wsColor(l.ws)+'">'+wsLabel(l.ws)+'</span></td>'+
                '<td class="num" style="font-family:var(--font-mono)">'+l.ndvi.toFixed(2)+'</td>'+
              '</tr>'}).join('')+
            '</tbody>'+
          '</table>'+
        '</div>'+
        '<div class="card">'+
          '<div class="card-title"><span class="icon" style="color:var(--sig-alert)">&#9888;</span> Alertas Activas ('+alerts.length+')</div>'+
          (alerts.length?alerts.map(function(a){return '<div class="alert-item '+a.type+'">'+
            '<span class="a-icon">'+a.icon+'</span>'+
            '<div><div class="a-text">'+a.text+'</div><div class="a-action">&#8594; '+a.action+'</div></div>'+
          '</div>'}).join(''):'<div style="color:var(--bold-gray-3);font-size:13px;padding:12px">Sin alertas activas. Operacion dentro de parametros normales.</div>')+
        '</div>'+
      '</div>'+
    '</div>'+
    badgeHTML();

  el.querySelector('#f-client-eval').addEventListener('change',function(e){renderEvaluacion(el,parseInt(e.target.value))});
}

// ══════════════════════════════════════════════════════
// VIEW 4: GESTION DE RIESGO (ex Cartera)
// ══════════════════════════════════════════════════════
function renderCartera(el){
  var totalExp=CLIENTS.reduce(function(s,c){return s+c.creditoTomado},0);
  var totalCap=CLIENTS.reduce(function(s,c){return s+clientCapProd(c)},0);
  var avgCob=CLIENTS.reduce(function(s,c){return s+c.cobertura},0)/CLIENTS.length;

  // Clients sorted by urgency (worst first)
  var urgentClients=CLIENTS.slice().sort(function(a,b){return a.score-b.score});
  var actionRequired=urgentClients.filter(function(c){return c.cobertura<1||c.score<40});

  var redCount=CLIENTS.filter(function(c){return c.score<40}).length;
  var yellowCount=CLIENTS.filter(function(c){return c.score>=40&&c.score<55}).length;
  var greenCount=CLIENTS.filter(function(c){return c.score>=75}).length;
  var orangeCount=CLIENTS.filter(function(c){return c.score>=55&&c.score<75}).length;

  // Donut SVG
  var donutData=[{label:'Bajo Riesgo',count:greenCount,color:'var(--sig-up)'},{label:'Moderado',count:orangeCount,color:'var(--sig-warn)'},{label:'Elevado',count:yellowCount,color:'var(--sig-alert)'},{label:'Critico',count:redCount,color:'var(--sig-down)'}];
  var total=CLIENTS.length;
  var cumAngle=0;
  var donutArcs=donutData.filter(function(d){return d.count>0}).map(function(d){
    var frac=d.count/total;var start=cumAngle;cumAngle+=frac*360;
    var end=cumAngle;var large=frac>.5?1:0;
    var sr=start*Math.PI/180,er=end*Math.PI/180;
    var r=40,cx=50,cy=50;
    var x1=cx+r*Math.cos(sr),y1=cy+r*Math.sin(sr);
    var x2=cx+r*Math.cos(er),y2=cy+r*Math.sin(er);
    return '<path d="M'+cx+','+cy+' L'+x1+','+y1+' A'+r+','+r+' 0 '+large+' 1 '+x2+','+y2+' Z" fill="'+d.color+'" opacity=".85"/>';
  }).join('');

  el.innerHTML=
    '<div class="hud-bracket">'+
      '<div class="section-title">Gestion de Riesgo</div>'+
      '<div class="section-sub">Detecta riesgo antes del default. Priorizacion automatica de acciones sobre tu cartera.</div>'+
    '</div>'+

    // ACTION REQUIRED BANNER
    (actionRequired.length?
    '<div class="action-banner">'+
      '<div class="ab-title">&#9888;&#65039; Accion requerida hoy</div>'+
      '<div class="ab-count">'+actionRequired.length+' cliente'+(actionRequired.length>1?'s':'')+' con riesgo critico</div>'+
      '<div style="margin-top:10px;font-size:12px;color:var(--bold-gray-3)">'+actionRequired.map(function(c){return '<strong style="color:var(--sig-down)">'+c.name+'</strong>'}).join(' &middot; ')+'</div>'+
    '</div>':'')+

    '<div class="kpi-row">'+
      '<div class="kpi-card cyan"><div class="kpi-label">Clientes</div><div class="kpi-value">'+CLIENTS.length+'</div></div>'+
      '<div class="kpi-card warn"><div class="kpi-label">Exposicion Crediticia</div><div class="kpi-value">'+fmtUSD(totalExp)+'</div></div>'+
      '<div class="kpi-card up"><div class="kpi-label">Capacidad Productiva</div><div class="kpi-value">'+fmtUSD(totalCap)+'</div></div>'+
      '<div class="kpi-card '+(avgCob>=1?'up':'down')+'"><div class="kpi-label">Cobertura Promedio</div><div class="kpi-value">'+avgCob.toFixed(2)+'x</div></div>'+
    '</div>'+
    '<div class="grid-map-right">'+
      '<div>'+
        '<div class="card">'+
          '<div class="card-title"><span class="icon">&#9673;</span> Mapa de Cartera</div>'+
          '<div id="map-cartera"></div>'+
        '</div>'+
        '<div class="card">'+
          '<div class="card-title"><span class="icon" style="color:var(--sig-down)">&#9888;</span> Alertas Priorizadas por Urgencia</div>'+
          (actionRequired.length?actionRequired.map(function(c,i){
            var urgency=c.cobertura<1?'CRITICO':'ALTO';
            var urgCol=c.cobertura<1?'var(--sig-down)':'var(--sig-alert)';
            var action=c.cobertura<1?'Contactar para renegociar condiciones':'Solicitar garantia adicional o reducir exposicion';
            return '<div class="alert-item '+(c.cobertura<1?'red':'orange')+'">'+
              '<span class="a-icon" style="font-size:14px;font-family:var(--font-mono);color:'+urgCol+';font-weight:700">'+(i+1)+'</span>'+
              '<div>'+
                '<div class="a-text"><strong>'+c.name+'</strong> -- <span style="color:'+urgCol+'">'+urgency+'</span> -- Cobertura '+c.cobertura.toFixed(2)+'x, Score '+c.score+'/100, Exposicion '+fmtUSD(c.creditoTomado)+'</div>'+
                '<div class="a-action">&#8594; '+action+'</div>'+
              '</div>'+
            '</div>';
          }).join(''):'<div style="color:var(--sig-up);font-size:13px;padding:12px">&#10003; Cartera sin alertas criticas.</div>')+
        '</div>'+
      '</div>'+
      '<div>'+
        '<div class="card">'+
          '<div class="card-title"><span class="icon">&#9678;</span> Distribucion por Semaforo</div>'+
          '<div class="donut-wrap">'+
            '<svg viewBox="0 0 100 100" width="140" height="140" style="transform:rotate(-90deg)">'+donutArcs+'</svg>'+
            '<div class="donut-legend">'+
              donutData.map(function(d){return '<div class="donut-legend-item"><div class="dlc" style="background:'+d.color+'"></div>'+d.label+': <strong>'+d.count+'</strong></div>'}).join('')+
            '</div>'+
          '</div>'+
        '</div>'+
        '<div class="card">'+
          '<div class="card-title"><span class="icon">&#128202;</span> Clientes por Prioridad de Atencion</div>'+
          '<div class="tbl-scroll" style="max-height:340px">'+
            '<table class="tbl" id="cartera-table" style="table-layout:fixed">'+
              '<thead><tr><th style="width:8%">#</th><th style="width:30%">Cliente</th><th class="num" style="width:13%">Score</th><th class="num" style="width:17%">Exposicion</th><th class="num" style="width:12%">Cob.</th><th style="width:20%">Estado</th></tr></thead>'+
              '<tbody></tbody>'+
            '</table>'+
          '</div>'+
        '</div>'+
      '</div>'+
    '</div>'+
    badgeHTML();

  // Populate cartera table (sorted by urgency)
  var tbody=el.querySelector('#cartera-table tbody');
  urgentClients.forEach(function(c,i){
    var g=goNoGo(c);
    tbody.innerHTML+=
      '<tr style="cursor:pointer" onclick="drillClient('+c.id+')">'+
        '<td><span class="rank-num" style="color:'+scoreColor(c.score)+'">'+(i+1)+'</span></td>'+
        '<td style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+c.name+'</td>'+
        '<td class="num" style="font-family:var(--font-mono);color:'+scoreColor(c.score)+'">'+c.score+'</td>'+
        '<td class="num">'+fmtUSD(c.creditoTomado)+'</td>'+
        '<td class="num" style="color:'+(c.cobertura>=1?'var(--sig-up)':'var(--sig-down)')+'">'+c.cobertura.toFixed(2)+'x</td>'+
        '<td><span class="go-badge '+g.cls+'" style="font-size:10px;padding:2px 8px">'+g.label+'</span></td>'+
      '</tr>';
  });

  // Map
  setTimeout(function(){
    initMap('map-cartera');
    if(!map)return;
    CLIENTS.forEach(function(c){
      var coords=DEPTO_COORDS[c.depto];
      if(!coords)return;
      var col=c.score>=75?'#00e676':c.score>=55?'#ffd740':c.score>=40?'#ff9100':'#ff5252';
      var m=L.circleMarker(coords,{radius:12,fillColor:col,fillOpacity:.5,color:col,weight:2,opacity:.7}).addTo(map);
      m.bindPopup('<div style="font-family:sans-serif;font-size:13px"><strong>'+c.name+'</strong><br>Score: '+c.score+'/100<br>Cobertura: '+c.cobertura.toFixed(2)+'x<br>Exposicion: '+fmtUSD(c.creditoTomado)+'</div>');
      mapLayers.push(m);
    });
    map.fitBounds(CLIENTS.map(function(c){return DEPTO_COORDS[c.depto]}).filter(Boolean),{padding:[30,30]});
  },300);
}

// ── DRILL-DOWN (from Cartera table) ──
window.drillClient=function(id){
  switchView('evaluacion');
  setTimeout(function(){renderEvaluacion(document.getElementById('view-evaluacion'),id)},50);
};
